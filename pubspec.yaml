name: scalable_flutter_app_starter
description: A scalable Flutter app.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.0.0+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Common
  flutter_bloc: ^9.1.0
  loggy: ^2.0.3
  flutter_loggy: ^2.0.3+1
  go_router: ^15.1.1
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # iOS
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
